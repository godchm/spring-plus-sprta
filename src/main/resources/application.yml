spring:
  datasource:
    url: jdbc:mysql://localhost:3306/plus?createDatabaseIfNotExist=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    SPRING_DATASOURCE_USERNAME:
    SPRING_DATASOURCE_PASSWORD:
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
    defer-datasource-initialization: true


