spring:
  config:
    activate:
      on-profile: prod
    import: aws-parameterstore:/expert/prod/

  datasource:
    url: jdbc:mysql://${RDS_ENDPOINT}:${RDS_PORT}/${RDS_DB_NAME}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${RDS_USERNAME}
    password: ${RDS_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: update

  cloud:
    aws:
      parameterstore:
        region: ap-northeast-2
      region:
        static: ap-northeast-2
      s3:
        bucket: ${AWS_S3_BUCKET}

server:
  port: 8080
