spring:
  config:
    activate:
      on-profile: localtest

  datasource:
    url: jdbc:mysql://localhost:3306/plus_load_test?rewriteBatchedStatements=true
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    show-sql: false
    hibernate:
      ddl-auto: update


